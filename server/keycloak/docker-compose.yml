services:
  keycloak-db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: agentnexus-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DATABASE}
      POSTGRES_USER: ${KEYCLOAK_DATABASE_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DATABASE_USER} -d ${KEYCLOAK_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    networks:
      - keycloak

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:latest}
    container_name: agentnexus-keycloak
    restart: unless-stopped
    command: ["start-dev"]
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DATABASE}
      KC_DB_USERNAME: ${KEYCLOAK_DATABASE_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DATABASE_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-false}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: ${KEYCLOAK_HOSTNAME_BACKCHANNEL_DYNAMIC:-false}
      KC_HTTP_ENABLED: ${KEYCLOAK_HTTP_ENABLED:-true}
      KC_PROXY_HEADERS: ${KEYCLOAK_PROXY_HEADERS:-xforwarded}
      KC_LOG_LEVEL: ${KEYCLOAK_LOG_LEVEL:-INFO}
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8080}:8080"
    networks:
      - keycloak

volumes:
  keycloak-postgres-data:

networks:
  keycloak:
    name: agentnexus-keycloak
